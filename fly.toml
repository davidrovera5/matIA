# fly.toml — matIA
# Region gru (São Paulo) is the closest to Argentina.
# auto_stop is disabled because room state lives in RAM; stopping the
# machine would drop all active rooms.

app            = "matia-app"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"
  PORT     = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  max_machines_running = 1
  processes            = ["app"]

  [http_service.concurrency]
    type       = "connections"
    soft_limit = 200
    hard_limit = 400

[[vm]]
  size        = "shared-cpu-1x"
  memory      = "256mb"
  cpu_kind    = "shared"
  cpus        = 1
